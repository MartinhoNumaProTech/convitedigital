
<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Convite Exclusivo - Broders Company Gala Edition">
  <meta name="theme-color" content="#0a1628">
  <title>Convite Exclusivo - Broders Company</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1.5rem 1rem;
    font-family: 'Jost', sans-serif;
    background: #0a1628;
  }

  .invite-card {
    width: 100%;
    max-width: 420px;
    border: 0.5px solid rgba(255,255,255,0.15);
    background: #0d1f3c;
    border-radius: 12px;
    overflow: hidden;
  }

  .invite-header {
    background: #0a1a30;
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
    position: relative;
  }

  .c { position: absolute; width: 18px; height: 18px; border-color: rgba(133,183,235,0.4); border-style: solid; }
  .c-tl { top: 10px; left: 10px;  border-width: 0.5px 0 0 0.5px; }
  .c-tr { top: 10px; right: 10px; border-width: 0.5px 0.5px 0 0; }
  .c-bl { bottom: 10px; left: 10px;  border-width: 0 0 0.5px 0.5px; }
  .c-br { bottom: 10px; right: 10px; border-width: 0 0.5px 0.5px 0; }

  .invite-label {
    font-size: 9px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 1rem;
  }

  .invite-title {
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    font-size: 52px;
    color: #ffffff;
    line-height: 1.1;
    margin-bottom: 0.4rem;
  }

  .invite-subtitle {
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .invite-body {
    padding: 1.8rem 1.8rem;
    text-align: center;
  }

  .invite-to-label {
    font-size: 9px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    margin-bottom: 0.3rem;
  }

  .name-display {
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    font-size: 46px;
    color: #ffffff;
    min-height: 60px;
    line-height: 1.2;
    margin-bottom: 1.4rem;
    word-break: break-word;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 1.4rem;
  }
  .divider-line { flex: 1; height: 0.5px; background: rgba(133,183,235,0.25); }
  .divider-dot  { width: 3px; height: 3px; border-radius: 50%; background: rgba(133,183,235,0.55); }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 1.4rem;
    text-align: left;
  }

  .detail-block { display: flex; flex-direction: column; gap: 3px; }

  .detail-label {
    font-size: 8px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .detail-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: #ffffff;
    line-height: 1.3;
  }

  .proverb-block {
    margin-bottom: 1.4rem;
    padding: 1rem;
    border: 0.5px solid rgba(133,183,235,0.2);
    border-radius: 8px;
    background: rgba(55,138,221,0.07);
    text-align: center;
  }

  .proverb-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-style: italic;
    font-weight: 300;
    color: rgba(255,255,255,0.75);
    line-height: 1.6;
    margin-bottom: 0.4rem;
  }

  .proverb-ref {
    font-size: 8px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
  }

  .dress-note {
    font-size: 9px;
    letter-spacing: 0.26em;
    text-transform: uppercase;
    color: #ffffff;
    padding: 0.7rem 1.2rem;
    border: 0.5px solid rgba(133,183,235,0.3);
    border-radius: 8px;
    display: inline-block;
    background: rgba(55,138,221,0.15);
  }

  .invite-footer {
    border-top: 0.5px solid rgba(255,255,255,0.08);
    background: #0a1a30;
    padding: 1rem 1.5rem;
    text-align: center;
    font-size: 8px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* EDITOR centrado e expandido */
  .editor-section {
    width: 100%;
    max-width: 420px;
    margin-top: 1.4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .editor-section input {
    width: 100%;
    font-family: 'Roboto', sans-serif;
    font-weight: 600;
    font-size: 22px;
    padding: 12px 16px;
    border-radius: 8px;
    border: 0.5px solid rgba(133,183,235,0.35);
    background: rgba(255,255,255,0.05);
    color: #ffffff;
    text-align: center;
    outline: none;
  }

  .editor-section input::placeholder {
    color: rgba(255,255,255,0.25);
    font-family: 'Jost', sans-serif;
    font-size: 14px;
  }

  .editor-section input:focus {
    border-color: rgba(133,183,235,0.6);
  }

  .editor-section button {
    width: 100%;
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    border-radius: 8px;
    border: 0.5px solid rgba(133,183,235,0.3);
    background: rgba(55,138,221,0.18);
    color: #ffffff;
    transition: background 0.15s;
  }

  .editor-section button:hover { background: rgba(55,138,221,0.3); }

  #pdf-btn:hover { background: rgba(76,175,80,0.3); }

  .hint {
    font-size: 11px;
    color: rgba(255,255,255,0.25);
    text-align: center;
  }
</style>

<div class="wrap">
  <div class="invite-card">
    <div class="invite-header">
      <div class="c c-tl"></div>
      <div class="c c-tr"></div>
      <div class="c c-bl"></div>
      <div class="c c-br"></div>
      <div class="invite-label">Convite Exclusivo</div>
      <div class="invite-title">Broders<br>Company</div>
      <div class="invite-subtitle">Gala Edition</div>
    </div>

    <div class="invite-body">
      <div class="invite-to-label">Para</div>
      <div class="name-display" id="name-out">Convidado</div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <div class="details-grid">
        <div class="detail-block">
          <span class="detail-label">Data</span>
          <span class="detail-value">12 de Abril</span>
        </div>
        <div class="detail-block">
          <span class="detail-label">Hora</span>
          <span class="detail-value">16h00</span>
        </div>
        <div class="detail-block" style="grid-column: 1 / -1;">
          <span class="detail-label">Local</span>
          <span class="detail-value">Salão do Mucososo<br><span style="font-size:14px; color:rgba(255,255,255,0.55);">Rua do Mucoso</span></span>
        </div>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-dot"></div>
        <div class="divider-line"></div>
      </div>

      <div class="proverb-block">
        <div class="proverb-text">"Melhor é um vizinho perto do que um irmão longe."</div>
        <div class="proverb-ref">Provérbios 27:10</div>
      </div>

      <div class="dress-note">Traje Elegante</div>
    </div>

    <div class="invite-footer">broders-company &nbsp;·&nbsp; 2026</div>
  </div>

  <div class="editor-section">
    <input type="text" id="name-input" placeholder="Escreve o nome do convidado..." />
    <button onclick="applyName()">Aplicar Nome</button>
    <button onclick="downloadPDF()" id="pdf-btn" style="background: rgba(76,175,80,0.2); border-color: rgba(76,175,80,0.4);">Salvar como PDF</button>
    <p class="hint">Escreve o nome e faz captura de ecrã para partilhar.</p>
  </div>
</div>

<script>
  document.fonts.ready.then(function() {
    document.getElementById('name-out').style.fontFamily = "'Roboto', sans-serif";
    document.querySelector('.invite-title').style.fontFamily = "'Roboto', sans-serif";
  });

  function applyName() {
    const val = document.getElementById('name-input').value.trim();
    const el = document.getElementById('name-out');
    el.textContent = val || 'Convidado';
    el.style.fontFamily = "'Roboto', sans-serif";
  }

  document.getElementById('name-input').addEventListener('keydown', function(e){
    if (e.key === 'Enter') applyName();
  });

  function downloadPDF() {
    const name = document.getElementById('name-input').value.trim();
    if (!name) {
      alert('Por favor, coloque o nome do convidado primeiro!');
      return;
    }

    const element = document.querySelector('.invite-card');
    const opt = {
      margin: 10,
      filename: `convite_${name}.pdf`,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: { scale: 2 },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
  }
</script>

</body>
</html>
